name: CI Checks

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Solana Security Standard
        uses: Copenhagen0x/solana-security-standard@v1.9.0
        with:
          paths: .
          fail-on-findings: false
          upload-sarif: true