name: CI checks

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

  security:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: Copenhagen0x/solana-security-standard@v1.9.0
        with:
          paths: .
          fail-on-findings: true
          upload-sarif: true